<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    div{
        display: flex;
        justify-content: center;
        align-items: center;
    }
    #gparent{
       
        border: 2px solid rgb(1, 12, 12);
        height: 400px;
        width: 400px;
        background-color: rgb(31, 191, 31);
        
    }
    #parent{
       
        border: 2px solid rgb(8, 9, 9);
        height: 300px;
        width: 300px;
        background-color: royalblue;
    }
    #child{
       
        border: 2px solid rgb(16, 18, 18);
        height: 200px;
        width: 200px;
        background-color: azure;
    }

</style>
<body>
    <div id="gparent">
         <div id="parent">
             <div id="child"></div>
         </div>
    </div>
   
<script>
    let gparent=document.querySelector("#gparent")
    let parent =document.querySelector("#parent")
    let child =document.querySelector("#child")

    gparent.addEventListener("click",(e)=>{
        e.stopImmediatePropagation()
        console.log("gparent");
    })

    parent.addEventListener("click",(e)=>{
        e.stopImmediatePropagation()
        console.log("parent");
    })

    child.addEventListener("click",(e)=>{
        e.stopImmediatePropagation()
        console.log("child");
    })

</script>
   
</body>
</html>
