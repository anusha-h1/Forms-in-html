<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    span::before{
        content: "Software Dev";
        animation: change 6s  linear 0s infinite ;
    }
    @keyframes change {
        0%{
            content: "Software Dev";
            color: aqua;
            text-shadow: 0px 0px 5px rgb(236, 223, 223);
        }
        25%{
            content: "Frontend Dev";
            color: blueviolet;
        }
        50%{
            content: "Mern Dev";
            color: chartreuse;
        }
        75%{
            content: "Backend Dev";
            color: yellow;
        }
        100%{
            content: "Middleware Dev";
            color: aqua;
        }
        
    }
    body{
        background-color: black;
    }
    h1{
        color: aliceblue;
    }
    button{
       padding: 20px 30px;
        animation: abc 2s linear 0s infinite;
    }
    @keyframes abc {
        0%{
            transform: scale(1);

        }
        50%{
            transform: scale(1.1);
        }
        100%
        {
            transform: scale(1);
        }
    }

 h2{
    opacity: 0;
    animation: glow 1s linear 0s infinite;
    color: aliceblue;
 }
 @keyframes glow{
    0%
    {
        opacity: 0;
    }
    50%{
        opacity: 1;
    }
    100%{
        opacity: 0;
    }
 }
</style>
<body>
    <h1>I am <span></span></h1>
    <button>Click</button>
    <h2>Frontend Dev</h2>
</body>
</html>
